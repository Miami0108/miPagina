<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ellencita ❤️</title>
    <style>
        /* Estilos generales y fondo */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Estilo del texto principal */
        h1 {
            color: #d63384;
            font-size: 4rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(214, 51, 132, 0.2);
            z-index: 10;
        }

        /* Estilo del mensaje de la carta */
        p {
            color: #4a4a4a;
            font-size: 1.3rem;
            max-width: 500px;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(214, 51, 132, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            z-index: 10;
        }

        /* Corazón central con animación */
        .heart {
            color: #ff4d4d;
            font-size: 6rem;
            animation: heartbeat 1.5s infinite;
            margin: 10px 0 20px 0;
            z-index: 10;
        }

        /* Fotogramas de la animación del latido */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        /* Contenedor para el efecto de fondo */
        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body>
    <!-- Contenedor donde se generarán los corazones de fondo -->
    <div class="floating-hearts" id="floating-hearts"></div>
    
    <h1>Hola, Ellencita</h1>
    <div class="heart">❤️</div>
    <p>Hola te amo mucho corazón de mi vida, eres la mejor del mundo.</p>
    <p>(Sí, está hecho con chat, pero prometo aprender para hacerte uno bonito 😞, en lo mientras quiero que tengas algo bonito para poder ver cada que te metas aquí). </p>

    <script>
        // Lógica para crear un efecto de corazones flotantes de fondo
        function createHeart() {
            const heart = document.createElement('div');
            // Usamos diferentes emojis al azar
            const emojis = ['💖', '💕', '🌸', '✨'];
            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Propiedades iniciales
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            heart.style.opacity = Math.random() * 0.5 + 0.3;
            heart.style.transition = 'transform 5s linear, top 5s linear';
            
            document.getElementById('floating-hearts').appendChild(heart);

            // Iniciar movimiento hacia arriba
            setTimeout(() => {
                heart.style.top = '-10vh';
                heart.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
            }, 50);

            // Eliminar el elemento cuando sale de la pantalla para no saturar la memoria
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        // Generar un nuevo corazón cada 400 milisegundos
        setInterval(createHeart, 400);
    </script>
</body>
</html>
